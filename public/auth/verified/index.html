<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email verified — Maia</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { margin: 0 0 24px; color: #64748b; font-size: 0.95rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 20px;
      background: #4f46e5;
      color: #fff !important;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email verified</h1>
    <p>Your email is confirmed. Continue in the Maia app.</p>
    <a class="btn" id="openApp" href="#">Open Maia</a>
  </div>
  <script>
    (function () {
      var APP_SCHEME = "com.mehmetakdemir.maia";
      var appURL = APP_SCHEME + "://auth/verified?verified=1";
      var link = document.getElementById("openApp");
      link.href = appURL;
      window.location.href = appURL;
    })();
  </script>
</body>
</html>
